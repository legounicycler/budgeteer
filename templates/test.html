<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Widget Layout</title>
    <link href="{{url_for('static', filename='css/materialize.css')}}" type="text/css" rel="stylesheet" media="screen,projection"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/test.css') }}">
</head>
<body>

    <div class="app-container">
    <nav class="main-header yellow darken-4">
        <a href="#" data-target="view-out" class="sidenav-trigger">
            <i class="material-icons white-text">menu</i>
        </a>
        <img src="{{url_for('static', filename='img/Budgeteer_Text_Shadow.png')}}" id="logo">
        <div style="width: 24px;"></div> </nav>

    <main>
        <div id="viewport" class="row">
            <div id="dashboard-column" class="col s12 m12 l8">

                <div id="dashboard-header">
                    <div id="total-container" style="padding: 10px;">
                        <h5 class="center">Total: <span class="balance">$1,234.56</span></h5>
                    </div>
                </div>

                <form id="multi-delete-form">
                    <div id="transactions-bin">
                        <div id="dashboard-viewport">
                            <div class="table-header">
                                <div>DATE</div>
                                <div>ITEM</div>
                                <div style="text-align: right;">AMOUNT</div>
                            </div>
                            <div id="transactions-scroller">
                                {% for i in range(50) %}
                                <div class="transaction-row">
                                    <div style="color: #999;">05/07</div>
                                    <div style="font-weight: 500;">Transaction {{ i }}</div>
                                    <div style="text-align: right; font-weight: bold;">$50.00</div>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </main>

    <footer id="footer" class="yellow darken-4">
        <i class="material-icons white-text">home</i>
        <i class="material-icons white-text">mail_outline</i>
        <i class="material-icons white-text">account_balance</i>
    </footer>
</div>

</body>
</html>

<!-- FAB: Toggle dashboard header height -->
<button id="toggle-header-fab" aria-label="Toggle header height" title="Toggle header height">
        <i class="material-icons">expand_less</i>
</button>

<script>
    (function(){
        const fab = document.getElementById('toggle-header-fab');
        const root = document.documentElement;
        const icon = fab.querySelector('i');
        const small = '90px';
        const large = '190px';
        const cur = getComputedStyle(root).getPropertyValue('--dashboard-header-height').trim() || small;
        let expanded = cur === large;
        icon.textContent = expanded ? 'expand_more' : 'expand_less';

        fab.addEventListener('click', function(){
            expanded = !expanded;
            root.style.setProperty('--dashboard-header-height', expanded ? large : small);
            icon.textContent = expanded ? 'expand_more' : 'expand_less';
        });
    })();
</script>
